.logo{

.actions{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.75rem 1.5rem;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;
  text-decoration:none;transition:all .2s;
}
.btn-gold{background:var(--gold);color:#0D1B2A;}
.btn-gold:hover{background:#c9a830;transform:translateY(-1px);}
.btn-outline{border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
